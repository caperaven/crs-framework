    :host #ul-slot {
        padding: 0.7rem;
        overflow: auto;
        background-color: white;
    }

    :host ul.list {
        margin: 0 5px 0 0;
    }

    :host ul.list li {
        border-bottom: 1px solid #D5D5D5;
        padding: 0.5rem 0 ;
        margin: 0 0.5rem;
        list-style: none;
    }


    :host .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, 110px);
        grid-template-rows: repeat(auto-fill, 110px);
        gap: 0.5rem;
        margin: 0 5px 0 0;
    }

    :host ul.grid li:not([hidden]) {
        display: flex;
        flex-direction: column;
        border: 1px solid #D5D5D5;
        border-radius: 5px;
        align-items: center;
        background-color: white;
    }

    :host ul.grid li[aria-hidden="true"] {
        display: none;
    }

    :host ul.list li[aria-hidden="true"] {
        display: none;
    }


    :host .scrollbar::-webkit-scrollbar-track {
        padding: 2px 0;
        background-color: transparent;
    }

    :host .scrollbar::-webkit-scrollbar {
        width: 5px;
    }

    :host .scrollbar::-webkit-scrollbar-thumb {
        border-radius: 10px;
        box-shadow: inset 0 0 6px rgba(0,0,0,.3);
        background-color: transparent;
    }

    :host ul.grid img {
        display: flex;
        height: 100px;
        width: 100px;
    }

    :host .resize {
        position: absolute;
        right: 0.5rem;
        bottom: 0.5rem;
        cursor: nwse-resize;
        scale: 0.6;
    }

    .icon {
        font-family: crsfrw;
        font-size: 1.5rem;
    }

    .round-left {
        border-radius: 5px 0 0 5px !important;
    }

    .round-right {
        border-radius: 0 5px 5px 0 !important;
    }

    #header-container {
        display: flex;
        flex-direction: row;
    }

<template id="filter-header">
    <filter-header for="ul" slot="filter">
        <options-toolbar slot="actions">
            <button  data-id="grid-btn" class="icon round-left"  click.setvalue="displayStatus = 'grid'" style="font-size: 1.5rem">grid-on</button>
            <button  data-id="list-btn" class="icon round-right" click.setvalue="displayStatus = 'list'" style="font-size: 1.5rem">format-list-bulleted</button>
        </options-toolbar>
    </filter-header>
</template>
